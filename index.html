<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelBee · 拼豆大师</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===== 启动闪屏 ===== -->
    <div id="splashScreen">
        <div class="splash-content">
            <div class="splash-logo">🧩 PixelBee</div>
            <div class="splash-sub">拼豆图纸转换器 · 企业版</div>
            <div class="splash-bar-track">
                <div class="splash-bar-fill" id="splashProgress"></div>
            </div>
            <div class="splash-text" id="splashText">正在加载引擎...</div>
        </div>
    </div>

    <!-- ===== 官网首页 ===== -->
    <div id="homePage" style="display:none;">
        <div class="home-container">
            <div class="home-card">
                <div class="home-logo">🧩 PixelBee</div>
                <div class="home-badge">✦ 企业级拼豆图纸引擎 ✦</div>
                <p class="home-desc">
                    将任何图片一键转为<strong>带色号的拼豆图纸</strong>。<br>
                    内置 H系列 / Artkal 双色板 · 离线运算 · 隐私安全
                </p>
                <div class="home-author">👤 由 <strong>八年级·折腾家</strong> 开发</div>
                <div class="home-buttons">
                    <a href="tool.html" class="btn-home web">
                        <span class="icon">🌐</span> 在线使用 · 免下载
                    </a>
                    <button class="btn-home offline" id="downloadOfflineBtn">
                        <span class="icon">⬇️</span> 下载桌面版 (离线)
                    </button>
                </div>
                <p class="home-footer">数据不上传服务器 · 完全本地运算</p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
